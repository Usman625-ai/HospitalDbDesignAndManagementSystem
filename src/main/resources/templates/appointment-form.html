<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Appointment Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🏥 Hospital Management System</a>
        <a href="/appointments" class="btn btn-outline-light">Back to Appointments</a>
    </div>
</nav>

<div class="container mt-4">
    <h2>Book Appointment</h2>

    <form th:action="@{/appointments/save}" th:object="${appointment}" method="post" class="mt-4">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Patient</label>
                <select th:field="*{patient.id}" class="form-control" required>
                    <option value="">Select Patient</option>
                    <option th:each="p : ${patients}" th:value="${p.id}" th:text="${p.fullName + ' (' + p.patientId + ')'}"></option>
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label>Doctor</label>
                <select th:field="*{doctor.id}" class="form-control" required>
                    <option value="">Select Doctor</option>
                    <option th:each="d : ${doctors}" th:value="${d.id}" th:text="${d.name + ' - ' + d.specialization}"></option>
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label>Appointment Date & Time</label>
                <input type="datetime-local" th:field="*{appointmentDateTime}" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Status</label>
                <select th:field="*{status}" class="form-control">
                    <option value="SCHEDULED">Scheduled</option>
                    <option value="CONFIRMED">Confirmed</option>
                </select>
            </div>
            <div class="col-md-12 mb-3">
                <label>Symptoms</label>
                <textarea th:field="*{symptoms}" class="form-control" rows="2"></textarea>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Book Appointment</button>
        <a href="/appointments" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
