<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bills</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🏥 Hospital Management System</a>
        <a href="/" class="btn btn-outline-light">Back to Dashboard</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between">
        <h2>Bill Management</h2>
        <a href="/bills/generate" class="btn btn-success">+ Generate Bill</a>
    </div>

    <div class="alert alert-info mt-3">
        Total Revenue This Month: <strong>$<span th:text="${totalRevenue}">0</span></strong>
    </div>

    <table class="table table-striped mt-3">
        <thead>
        <tr>
            <th>ID</th>
            <th>Patient</th>
            <th>Doctor</th>
            <th>Total Amount</th>
            <th>Payment Status</th>
            <th>Bill Date</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="bill : ${bills}">
            <td th:text="${bill.id}">1</td>
            <td th:text="${bill.patientName}">Patient</td>
            <td th:text="${bill.doctorName}">Doctor</td>
            <td th:text="'$' + ${bill.totalAmount}">100</td>
            <td th:text="${bill.paymentStatus}">PENDING</td>
            <td th:text="${bill.billDate}">Date</td>
            <td>
                <a th:href="'/bills/pay/' + ${bill.id}" class="btn btn-sm btn-success" th:if="${bill.paymentStatus == 'PENDING'}">Pay Now</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
