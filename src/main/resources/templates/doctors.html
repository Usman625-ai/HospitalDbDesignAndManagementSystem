<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🏥 Hospital Management System</a>
        <a href="/" class="btn btn-outline-light">Back to Dashboard</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between">
        <h2>Doctor Management</h2>
        <a href="/doctors/add" class="btn btn-primary">+ Add Doctor</a>
    </div>

    <table class="table table-striped mt-3">
        <thead>
        <tr><th>ID</th><th>Name</th><th>Email</th><th>Specialization</th><th>Department</th><th>Consultation Fee</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody>
        <tr th:each="doc : ${doctors}">
            <td th:text="${doc.id}">1</td>
            <td th:text="${doc.name}">Dr. John</td>
            <td th:text="${doc.email}">john@hospital.com</td>
            <td th:text="${doc.specialization}">Cardiologist</td>
            <td th:text="${doc.departmentName}">Cardiology</td>
            <td th:text="'$' + ${doc.consultationFee}">100</td>
            <td th:text="${doc.status}">AVAILABLE</td>
            <td>
                <a th:href="'/doctors/edit/' + ${doc.id}" class="btn btn-sm btn-warning">Edit</a>
                <a th:href="'/doctors/delete/' + ${doc.id}" class="btn btn-sm btn-danger" onclick="return confirm('Delete this doctor?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
