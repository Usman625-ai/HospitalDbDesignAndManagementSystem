<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Medicines</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🏥 Hospital Management System</a>
        <a href="/" class="btn btn-outline-light">Back to Dashboard</a>
    </div>
</nav>

<div class="container mt-4">
    <h2>Medicine Inventory</h2>

    <table class="table table-striped mt-3">
        <thead>
        <tr>
            <th>Medicine Name</th>
            <th>Category</th>
            <th>Unit Price</th>
            <th>Quantity</th>
            <th>Reorder Level</th>
            <th>Status</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="m : ${medicines}">
            <td th:text="${m.medicineName}">Paracetamol</td>
            <td th:text="${m.category}">TABLET</td>
            <td th:text="'$' + ${m.unitPrice}">10</td>
            <td th:text="${m.quantity}">500</td>
            <td th:text="${m.reorderLevel}">50</td>
            <td th:text="${m.status}">ACTIVE</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
