<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Generate Bill</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🏥 Hospital Management System</a>
        <a href="/bills" class="btn btn-outline-light">Back to Bills</a>
    </div>
</nav>

<div class="container mt-4">
    <h2>Generate Bill</h2>

    <form th:action="@{/bills/save}" th:object="${bill}" method="post" class="mt-4">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Patient</label>
                <select th:field="*{patient.id}" class="form-control" required>
                    <option value="">Select Patient</option>
                    <option th:each="p : ${patients}" th:value="${p.id}" th:text="${p.fullName}"></option>
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label>Doctor</label>
                <select th:field="*{doctor.id}" class="form-control" required>
                    <option value="">Select Doctor</option>
                    <option th:each="d : ${doctors}" th:value="${d.id}" th:text="${d.name}"></option>
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label>Appointment</label>
                <select th:field="*{appointment.id}" class="form-control">
                    <option value="">Select Appointment</option>
                    <option th:each="a : ${appointments}" th:value="${a.id}" th:text="${a.appointmentDateTime}"></option>
                </select>
            </div>
            <div class="col-md-3 mb-3">
                <label>Consultation Fee</label>
                <input type="number" step="any" th:field="*{consultationFee}" class="form-control">
            </div>
            <div class="col-md-3 mb-3">
                <label>Medication Charges</label>
                <input type="number" step="any" th:field="*{medicationCharges}" class="form-control">
            </div>
            <div class="col-md-3 mb-3">
                <label>Lab Charges</label>
                <input type="number" step="any" th:field="*{labCharges}" class="form-control">
            </div>
            <div class="col-md-3 mb-3">
                <label>Room Charges</label>
                <input type="number" step="any" th:field="*{roomCharges}" class="form-control">
            </div>
            <div class="col-md-3 mb-3">
                <label>Discount Amount</label>
                <input type="number" step="any" th:field="*{discountAmount}" class="form-control">
            </div>
            <div class="col-md-12 mb-3">
                <label>Description</label>
                <textarea th:field="*{description}" class="form-control" rows="2"></textarea>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Generate Bill</button>
        <a href="/bills" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
