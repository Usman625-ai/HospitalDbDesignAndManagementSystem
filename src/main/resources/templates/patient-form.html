<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Patient Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🏥 Hospital Management System</a>
        <a href="/patients" class="btn btn-outline-light">Back to Patients</a>
    </div>
</nav>

<div class="container mt-4">
    <h2 th:text="${patient.id} ? 'Edit Patient' : 'Add New Patient'">Patient Form</h2>

    <form th:action="@{/patients/save}" th:object="${patient}" method="post" class="mt-4">
        <input type="hidden" th:field="*{id}"/>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>First Name</label>
                <input type="text" th:field="*{firstName}" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Last Name</label>
                <input type="text" th:field="*{lastName}" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Email</label>
                <input type="email" th:field="*{email}" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Phone Number</label>
                <input type="text" th:field="*{phoneNumber}" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Date of Birth</label>
                <input type="date" th:field="*{dateOfBirth}" class="form-control">
            </div>
            <div class="col-md-6 mb-3">
                <label>Gender</label>
                <select th:field="*{gender}" class="form-control">
                    <option value="MALE">Male</option>
                    <option value="FEMALE">Female</option>
                    <option value="OTHER">Other</option>
                </select>
            </div>
            <div class="col-md-12 mb-3">
                <label>Address</label>
                <textarea th:field="*{address}" class="form-control" rows="2"></textarea>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Save Patient</button>
        <a href="/patients" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
