<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Patients</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🏥 Hospital Management System</a>
        <a href="/" class="btn btn-outline-light">Back to Dashboard</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between">
        <h2>Patient Management</h2>
        <a href="/patients/add" class="btn btn-primary">+ Add Patient</a>
    </div>

    <table class="table table-striped mt-3">
        <thead>
        <tr>
            <th>ID</th><th>Patient ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Status</th><th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="patient : ${patients}">
            <td th:text="${patient.patientId}">PAT001</td>
            <td th:text="${patient.firstName}">John</td>
            <td th:text="${patient.lastName}">Doe</td>
            <td th:text="${patient.email}">john@email.com</td>
            <td th:text="${patient.status}">ACTIVE</td>
            <td th:text="${patient.registeredAt}">2025-6-24</td>
            <td>
                <a th:href="'/patients/edit/' + ${patient.id}" class="btn btn-sm btn-warning">Edit</a>
                <a th:href="'/patients/delete/' + ${patient.id}" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')">Delete</a>
                <a th:href="'/prescriptions/patient/' + ${patient.id}" class="btn btn-sm btn-info">Prescriptions</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
