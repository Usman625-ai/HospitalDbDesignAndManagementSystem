<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Appointments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🏥 Hospital Management System</a>
        <a href="/" class="btn btn-outline-light">Back to Dashboard</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between">
        <h2>Appointment Management</h2>
        <a href="/appointments/add" class="btn btn-primary">+ Book Appointment</a>
    </div>

    <table class="table table-striped mt-3">
        <thead>
        <tr>
            <th>ID</th><th>Patient</th><th>Doctor</th><th>Date & Time</th><th>Status</th><th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="apt : ${appointments}">
            <td th:text="${apt.id}">1</td>
            <td th:text="${apt.patient.firstName + ' ' + apt.patient.lastName}">Patient</td>
            <td th:text="${apt.doctor.name}">Doctor</td>
            <td th:text="${apt.appointmentDateTime}">Date</td>
            <td th:text="${apt.status}">Status</td>
            <td>
                <a th:href="'/appointments/cancel/' + ${apt.id}" class="btn btn-sm btn-danger" th:if="${apt.status != 'CANCELLED'}">Cancel</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
