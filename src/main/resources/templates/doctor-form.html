<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctor Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🏥 Hospital Management System</a>
        <a href="/doctors" class="btn btn-outline-light">Back to Doctors</a>
    </div>
</nav>

<div class="container mt-4">
    <h2 th:text="${doctor.id} ? 'Edit Doctor' : 'Add New Doctor'">Doctor Form</h2>

    <form th:action="@{/doctors/save}" th:object="${doctor}" method="post" class="mt-4">
        <input type="hidden" th:field="*{id}"/>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Name</label>
                <input type="text" th:field="*{name}" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Email</label>
                <input type="email" th:field="*{email}" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Phone Number</label>
                <input type="text" th:field="*{phoneNumber}" class="form-control">
            </div>
            <div class="col-md-6 mb-3">
                <label>Specialization</label>
                <input type="text" th:field="*{specialization}" class="form-control">
            </div>
            <div class="col-md-6 mb-3">
                <label>Consultation Fee</label>
                <input type="number" step="any" th:field="*{consultationFee}" class="form-control">
            </div>
            <div class="col-md-6 mb-3">
                <label>Qualification</label>
                <input type="text" th:field="*{qualification}" class="form-control">
            </div>
            <div class="col-md-12 mb-3">
                <label>Clinic Address</label>
                <textarea th:field="*{clinicAddress}" class="form-control" rows="2"></textarea>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Save Doctor</button>
        <a href="/doctors" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
