<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Hospital Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🏥 Hospital Management System</a>
        <div>
            <a href="/patients" class="btn btn-outline-light">Patients</a>
            <a href="/doctors" class="btn btn-outline-light">Doctors</a>
            <a href="/appointments" class="btn btn-outline-light">Appointments</a>
            <a href="/bills" class="btn btn-outline-light">Bills</a>
            <a href="/prescriptions" class="btn btn-outline-light">Prescriptions</a>
            <a href="/medicines" class="btn btn-outline-light">Medicines</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2>Dashboard</h2>
    <div class="row mt-4">
        <div class="col-md-3">
            <div class="card text-center bg-primary text-white">
                <div class="card-body">
                    <h1 th:text="${totalPatients}">0</h1>
                    <p>Total Patients</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center bg-success text-white">
                <div class="card-body">
                    <h1 th:text="${totalDoctors}">0</h1>
                    <p>Total Doctors</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center bg-info text-white">
                <div class="card-body">
                    <h1 th:text="${totalAppointments}">0</h1>
                    <p>Appointments</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center bg-warning">
                <div class="card-body">
                    <h1 th:text="${TotalDepartments}">0</h1>
                    <p>Total Departments</p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
