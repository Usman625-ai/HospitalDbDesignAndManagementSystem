# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hospitalmanagementsystem
spring.datasource.username=root
spring.datasource.password=mysqlusman
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration - Use 'create' for fresh start
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool - Limit concurrent connections
spring.datasource.hikari.maximumPoolSize=5
spring.datasource.hikari.connection-timeout=30000

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Ensure transaction management is enabled
spring.jpa.open-in-view=false
spring.transaction.rollback-on-commit-failure=true

# Batch settings
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Disable identity inserts for batching (requires sequence)
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Statistics to verify batching
spring.jpa.properties.hibernate.generate_statistics=true


# Disable dirty checking for read-only transactions
spring.jpa.properties.hibernate.default_batch_fetch_size=16

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Disable tests from running automatically
spring.test.context.cache.disabled=true